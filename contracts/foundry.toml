# Deputy Policy Vault — Foundry configuration.
# evm_version = "paris" keeps bytecode portable across Metis Andromeda and any
# EVM chain (avoids PUSH0/Shanghai-only opcodes some L2s lag on).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
# CampaignVault V2's 10-arg constructor + rich events exceed the legacy stack;
# the IR pipeline resolves "stack too deep". V1 ABIs are unchanged.
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
